<!DOCTYPE html>
<html>
<head>
  <title>Math Operations Demo</title>
</head>
<body>
  <h2>Subtraction, Multiplication, and Division</h2>

  <!-- Input fields -->
  <label for="num1">Enter first number:</label>
  <input type="number" id="num1"><br><br>

  <label for="num2">Enter second number:</label>
  <input type="number" id="num2"><br><br>

  <!-- Buttons for operations -->
  <button onclick="subtractNumbers()">Subtract</button>
  <button onclick="multiplyNumbers()">Multiply</button>
  <button onclick="divideNumbers()">Divide</button>

  <!-- Output area -->
  <h3>Result:</h3>
  <p id="output"></p>

  <script>
    function subtractNumbers() {
      let number1 = document.getElementById("num1").value;
      let number2 = document.getElementById("num2").value;
      let result = parseFloat(number1) - parseFloat(number2);
      document.getElementById("output").innerHTML = "Subtraction result: " + result;
    }

    function multiplyNumbers() {
      let number1 = document.getElementById("num1").value;
      let number2 = document.getElementById("num2").value;
      let result = parseFloat(number1) * parseFloat(number2);
      document.getElementById("output").innerHTML = "Multiplication result: " + result;
    }

    function divideNumbers() {
      let number1 = document.getElementById("num1").value;
      let number2 = document.getElementById("num2").value;

      if (parseFloat(number2) === 0) {
        document.getElementById("output").innerHTML = "Error: Division by zero is not allowed!";
      } else {
        let result = parseFloat(number1) / parseFloat(number2);
        document.getElementById("output").innerHTML = "Division result: " + result;
      }
    }
  </script>
</body>
</html>
