<!DOCTYPE html>
<html>
<head>
  <title>Even or Odd Checker</title>
</head>
<body>
  <h2>Check if a Number is Even or Odd</h2>

  <!-- Input field -->
  <label for="num">Enter a number:</label>
  <input type="number" id="num"><br><br>

  <!-- Button -->
  <button onclick="checkEvenOdd()">Check</button>

  <!-- Output area -->
  <h3>Result:</h3>
  <p id="output"></p>

  <script>
    function checkEvenOdd() {
      // Get the number from input
      let number = document.getElementById("num").value;

      // Check if even or odd
      if (number % 2 === 0) {
        document.getElementById("output").innerHTML = number + " is Even.";
      } else {
        document.getElementById("output").innerHTML = number + " is Odd.";
      }
    }
  </script>
</body>
</html>
