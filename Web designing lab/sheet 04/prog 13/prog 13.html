<!DOCTYPE html>
<html>
<head>
  <title>While Loop Example</title>
</head>
<body>
  <h2>Print Numbers from 1 to 10 using While Loop</h2>

  <!-- Button -->
  <button onclick="printNumbers()">Show Numbers</button>

  <!-- Output area -->
  <h3>Result:</h3>
  <p id="output"></p>

  <script>
    function printNumbers() {
      let result = "";
      let i = 1;

      // Using while loop to print numbers 1 to 10
      while (i <= 10) {
        result += i + " ";
        i++;
      }

      // Display result on webpage
      document.getElementById("output").innerHTML = result;
    }
  </script>
</body>
</html>
