<!DOCTYPE html>
<html>
<head>
  <title>Function Calling Demo</title>
</head>
<body>
  <h2>JavaScript Function Calling Example</h2>

  <!-- Button -->
  <button onclick="showGreeting()">Click Me</button>

  <!-- Output area -->
  <h3>Result:</h3>
  <p id="output"></p>

  <script>
    // Function definition
    function greetUser(name) {
      return "Hello, " + name + "! Welcome to the function calling demo.";
    }

    // Function calling
    function showGreeting() {
      // Call greetUser function and pass a value
      let message = greetUser("Alice");

      // Display result on webpage
      document.getElementById("output").innerHTML = message;
    }
  </script>
</body>
</html>
