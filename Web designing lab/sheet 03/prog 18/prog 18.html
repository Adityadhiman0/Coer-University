<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webpage with CSS and Iframe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    header {
      background: #333;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 1.5em;
    }

    nav {
      width: 20%;
      height: calc(100vh - 60px);
      float: left;
      background: #f9f9f9;
      border-right: 1px solid #ccc;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav ul li {
      border-bottom: 1px solid #ddd;
    }

    nav ul li a {
      display: block;
      padding: 12px;
      text-decoration: none;
      color: #333;
    }

    nav ul li a:hover {
      background: #ddd;
    }

    section {
      width: 80%;
      height: calc(100vh - 60px);
      float: left;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    footer {
      clear: both;
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    Webpage with CSS and Iframe
  </header>

  <nav>
    <ul>
      <li><a href="home.html" target="contentFrame">Home</a></li>
      <li><a href="about.html" target="contentFrame">About</a></li>
      <li><a href="services.html" target="contentFrame">Services</a></li>
      <li><a href="contact.html" target="contentFrame">Contact</a></li>
    </ul>
  </nav>

  <section>
    <iframe name="contentFrame" src="home.html"></iframe>
  </section>

  <footer>
    © 2026 My Website. All rights reserved.
  </footer>
</body>
</html>
