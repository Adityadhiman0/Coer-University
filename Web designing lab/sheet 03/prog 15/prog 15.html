<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Form with CSS IDs</title>
  <style>
    /* Container styling */
    #form-container {
      width: 400px;
      margin: 60px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    #form-title {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    /* Label styling */
    #label-name, #label-email, #label-password, #label-course {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #555;
    }

    /* Input fields */
    #input-name, #input-email, #input-password, #select-course {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    /* Button styling */
    #btn-submit {
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    #btn-submit:hover {
      background: #45a049;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div id="form-container">
    <h2 id="form-title">Registration Form</h2>
    <form>
      <label id="label-name" for="input-name">Full Name</label>
      <input type="text" id="input-name" name="name" placeholder="Enter your full name" required>

      <label id="label-email" for="input-email">Email Address</label>
      <input type="email" id="input-email" name="email" placeholder="Enter your email" required>

      <label id="label-password" for="input-password">Password</label>
      <input type="password" id="input-password" name="password" placeholder="Create a password" required>

      <label id="label-course" for="select-course">Course</label>
      <select id="select-course" name="course">
        <option value="btech">B.Tech</option>
        <option value="mba">MBA</option>
        <option value="msc">M.Sc</option>
        <option value="phd">Ph.D</option>
      </select>

      <button type="submit" id="btn-submit">Register</button>
    </form>
  </div>
</body>
</html>
