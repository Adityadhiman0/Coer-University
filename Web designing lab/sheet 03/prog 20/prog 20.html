<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Grid Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
    }

    .form-container {
      width: 500px;
      margin: 60px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    form {
      display: grid;
      grid-template-columns: 150px 1fr; /* label column + input column */
      grid-gap: 15px 20px;
      align-items: center;
    }

    label {
      font-weight: bold;
      color: #555;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    textarea {
      resize: none;
    }

    .form-actions {
      grid-column: span 2; /* buttons span across both columns */
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      margin: 0 10px;
      border: none;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .btn-submit {
      background: #4CAF50;
      color: white;
    }

    .btn-submit:hover {
      background: #45a049;
      transform: translateY(-2px);
    }

    .btn-reset {
      background: #f44336;
      color: white;
    }

    .btn-reset:hover {
      background: #d32f2f;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h2>Registration Form</h2>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Create a password" required>

      <label for="course">Course</label>
      <select id="course" name="course">
        <option value="btech">B.Tech</option>
        <option value="mba">MBA</option>
        <option value="msc">M.Sc</option>
        <option value="phd">Ph.D</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4" placeholder="Write your message here"><!DOCTYPE html>
