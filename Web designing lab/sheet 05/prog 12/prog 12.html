<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>String Functions Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 400px;
      text-align: center;
    }

    input {
      width: 80%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #45a049;
    }

    #output {
      margin-top: 15px;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>String Functions Demo</h2>
    <input type="text" id="myString" placeholder="Enter a string">
    <br>
    <button onclick="showLength()">Show Length</button>
    <button onclick="convertUpper()">Convert to Uppercase</button>
    <div id="output"></div>
  </div>

  <script>
    function showLength() {
      const str = document.getElementById("myString").value;
      document.getElementById("output").textContent = 
        `Length of string: ${str.length}`;
    }

    function convertUpper() {
      const str = document.getElementById("myString").value;
      document.getElementById("output").textContent = 
        `Uppercase: ${str.toUpperCase()}`;
    }
  </script>
</body>
</html>
