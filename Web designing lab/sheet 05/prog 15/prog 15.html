<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Object Creation Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 450px;
    }

    pre {
      background: #e0f7fa;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Object Creation in JavaScript</h2>
    <pre id="output"></pre>
  </div>

  <script>
    let output = "";

    // 1. Object literal
    const student = {
      name: "Rahul",
      age: 21,
      course: "Computer Science"
    };
    output += "Object Literal:\n" + JSON.stringify(student, null, 2) + "\n\n";

    // 2. Using new Object()
    const car = new Object();
    car.brand = "Toyota";
    car.model = "Corolla";
    car.year = 2022;
    output += "Using new Object():\n" + JSON.stringify(car, null, 2) + "\n\n";

    // 3. Using constructor function
    function Person(name, age) {
      this.name = name;
      this.age = age;
    }
    const person1 = new Person("Amit", 30);
    output += "Constructor Function:\n" + JSON.stringify(person1, null, 2) + "\n\n";

    // 4. Using class (ES6)
    class Book {
      constructor(title, author) {
        this.title = title;
        this.author = author;
      }
    }
    const book1 = new Book("JavaScript Basics", "John Doe");
    output += "Using Class:\n" + JSON.stringify(book1, null, 2);

    document.getElementById("output").textContent = output;
  </script>
</body>
</html>
