<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Character Counter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      width: 400px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 16px;
      resize: none;
    }

    #charCount {
      margin-top: 10px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Character Counter</h2>
    <textarea id="myText" placeholder="Type something here..."></textarea>
    <div id="charCount">Characters: 0</div>
  </div>

  <script>
    const textarea = document.getElementById("myText");
    const charCount = document.getElementById("charCount");

    textarea.addEventListener("input", () => {
      const count = textarea.value.length;
      charCount.textContent = `Characters: ${count}`;
    });
  </script>
</body>
</html>
