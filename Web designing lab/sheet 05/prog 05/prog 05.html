<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Current Date and Time</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #clock {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
      font-size: 20px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="clock">Loading current date and time...</div>

  <script>
    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString();   // Format: DD/MM/YYYY (based on locale)
      const time = now.toLocaleTimeString();   // Format: HH:MM:SS (based on locale)
      document.getElementById("clock").textContent = `Date: ${date} | Time: ${time}`;
    }

    // Update every second
    setInterval(updateClock, 1000);

    // Initial call
    updateClock();
  </script>
</body>
</html>
