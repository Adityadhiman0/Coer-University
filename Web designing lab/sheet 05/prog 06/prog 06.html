<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Button Click Function Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div>
    <button onclick="showMessage()">Click Me</button>
    <div id="message"></div>
  </div>

  <script>
    // Function definition
    function showMessage() {
      document.getElementById("message").textContent = "Hello! You clicked the button.";
    }
  </script>
</body>
</html>
