<!DOCTYPE html>
<html>
<head>
  <title>Change Background Color</title>
</head>
<body>
  <h2>Change Background Color using JavaScript</h2>

  <!-- Buttons to change background color -->
  <button onclick="changeColor('lightblue')">Light Blue</button>
  <button onclick="changeColor('lightgreen')">Light Green</button>
  <button onclick="changeColor('yellow')">Yellow</button>
  <button onclick="changeColor('pink')">Pink</button>

  <script>
    // Function to change background color
    function changeColor(color) {
      document.body.style.backgroundColor = color;
    }
  </script>
</body>
</html>
